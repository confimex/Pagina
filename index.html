<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIMEX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#fff;}

/* CONTENEDOR */
.container{
    max-width:1000px;
    margin:auto;
    padding:30px 15px;
}

/* IMÁGENES PRO */
.img{
    width:100%;
    height:400px;           /* 🔥 CONTROL REAL */
    object-fit:cover;       /* 🔥 RECORTE PRO */
    border-radius:10px;
}

/* HERO */
.hero img{
    height:350px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1.4fr;
    gap:15px;
}

@media(max-width:768px){
    .grid{grid-template-columns:1fr;}
}

/* BOTÓN */
.btn{
    background:#E65C2E;
    color:#fff;
    padding:14px 25px;
    border:none;
    border-radius:8px;
    margin-top:15px;
    cursor:pointer;
}

/* CENTRAR */
.center{text-align:center;}
</style>
</head>

<body>

<!-- LOGO -->
<div class="container center">
    <img src="logo.png" style="width:440px;">
</div>

<!-- HERO -->
<div class="container hero center">
    <img src="hero.jpg" class="img">
    <h1>OPTIMIZA TU PLANTA DE CONFECCIÓN</h1>
    <p style="color:#FFC107;font-weight:bold;">
        Reduce costos, mejora tiempos y controla producción
    </p>
    <a href="https://wa.me/525512895572" class="btn">
        SOLICITA ASESORÍA
    </a>
</div>

<!-- ANTES DESPUÉS -->
<div class="container grid">
    <img src="antes.jpg" class="img">
    <img src="despues.jpg" class="img">
</div>

<!-- SECCIONES -->
<div class="container center">
    <img src="asesoria.jpg" class="img">
    <button class="btn">SOLICITAR ASESORÍA</button>
</div>

<div class="container center">
    <img src="capacitacion.jpg" class="img">
    <button class="btn">MÁS INFORMACIÓN</button>
</div>

<div class="container center">
    <img src="trazo.jpg" class="img">
    <button class="btn">MÁS FUNCIONES</button>
</div>

<div class="container center">
    <img src="certificacion.jpg" class="img">
    <button class="btn">OTRAS CERTIFICACIONES</button>
</div>

<div class="container center">
    <img src="ploter.jpg" class="img">
    <button class="btn">OTRAS VENTAJAS</button>
</div>

<div class="container center">
    <img src="corte.jpg" class="img">
    <button class="btn">VER VIDEO</button>
</div>

<div class="container center">
    <img src="test.jpg" class="img">
    <button class="btn">RESPONDE EL TEST</button>
</div>

</body>
</html>
