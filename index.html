<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIMEX</title>

<style>
body{
    font-family: Arial;
    margin:0;
    text-align:center;
}

.section{
    padding:40px 20px;
}

/* 🔥 IMÁGENES PERFECTAS (NO SE ROMPEN) */
img{
    width:90%;
    max-width:900px;
    height:auto;
    margin:20px auto;
    display:block;
    border-radius:10px;
}

/* BOTÓN */
.btn{
    background:#E65C2E;
    color:white;
    padding:15px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:90%;
    max-width:500px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="section">
<img src="logo.png" style="max-width:250px;">
</div>

<!-- HERO -->
<div class="section">
<img src="hero.jpg">
<h1>OPTIMIZA TU PLANTA DE CONFECCIÓN</h1>
<p style="color:#FFC107;font-weight:bold;">
Reduce costos, mejora tiempos y controla producción
</p>
<a href="https://wa.me/521XXXXXXXXXX" class="btn">SOLICITA ASESORÍA</a>
</div>

<!-- ANTES DESPUÉS -->
<div class="section">
<img src="antes.jpg">
<img src="despues.jpg">
</div>

<!-- DIAGNÓSTICO -->
<div class="section">
<img src="asesoria.jpg">
<button class="btn" onclick="abrir('form')">SOLICITAR ASESORÍA</button>
</div>

<!-- CAPACITACIÓN -->
<div class="section">
<img src="capacitacion.jpg">
<button class="btn" onclick="video()">VER VIDEO</button>
</div>

<!-- CERTIFICACIÓN -->
<div class="section">
<img src="certificacion.jpg">
<button class="btn" onclick="abrir('cert')">CERTIFICACIONES</button>
</div>

<!-- TEST -->
<div class="section">
<img src="test.jpg">
<button class="btn" onclick="abrir('test')">RESPONDE EL TEST</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content" id="contenido"></div>
</div>

<script>

function abrir(tipo){
let c = document.getElementById("contenido");

if(tipo=="cert"){
c.innerHTML = `
<h2>Certificaciones</h2>
<ul>
<li>Cortador</li>
<li>Trazador</li>
<li>Fichas técnicas</li>
</ul>`;
}

if(tipo=="form"){
c.innerHTML = `
<h2>Asesoría</h2>
<input placeholder="Nombre" style="width:100%;margin:10px 0;padding:10px;">
<input placeholder="Teléfono" style="width:100%;margin:10px 0;padding:10px;">
<button class="btn">Enviar</button>`;
}

/* 🔥 TEST FUNCIONA */
if(tipo=="test"){
c.innerHTML = `
<h2>Diagnóstico</h2>

<p>¿Usas cartón?</p>
<select id="a"><option>SI</option><option>NO</option></select>

<p>¿Controlas tela?</p>
<select id="b"><option>SI</option><option>NO</option></select>

<br><br>
<button class="btn" onclick="res()">Resultado</button>

<p id="r"></p>`;
}

document.getElementById("modal").style.display="flex";
}

function res(){
let score=0;

if(document.getElementById("a").value=="SI") score++;
if(document.getElementById("b").value=="NO") score++;

if(score>=1){
document.getElementById("r").innerText="Necesitas optimizar tu planta";
}else{
document.getElementById("r").innerText="Vas bien pero puedes mejorar";
}
}

function video(){
document.getElementById("contenido").innerHTML =
`<iframe width="100%" height="300" src="https://www.youtube.com/embed/VIDEO_ID"></iframe>`;
document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick = function(){
this.style.display="none";
}

</script>

</body>
</html>
