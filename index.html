<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>CONFIMEX | Asesoría y Capacitación para la Confección</title>

        body {

            line-height: 1.3;
        }

        /* SECCIÓN PRINCIPAL: PANTALLA COMPLETA */
        .fullscreen {
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #FDF8F5 0%, #F2F6FC 100%);

            align-items: center;
            justify-content: center;

        .contenido {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        /* TARJETA PRINCIPAL */
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 3rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(232, 93, 34, 0.15);
        }

        /* ENCABEZADO */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-texto {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(120deg, #0A2B3E, #E85D22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .subrayado {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1E4A6E;
            border-top: 2px solid #E85D2240;
            border-bottom: 2px solid #E85D2240;
            display: inline-block;
            padding: 0.4rem 1.2rem;
        }
        .tagline {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            background: #E85D220C;
            color: #B64923;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            width: fit-content;
            margin: 1.5rem auto 0;
        }

        /* TÍTULOS DE SECCIÓN */
        .titulo-seccion {
            font-size: 1.9rem;
            font-weight: 800;
            margin: 2.5rem 0 1.5rem;
            text-align: center;
            color: #0F2C3F;
        }
