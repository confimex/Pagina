<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIMEX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial, sans-serif;background:#fff;color:#222;}

/* CONTENEDOR ORIGINAL (EL QUE FUNCIONA) */
.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}

/* IMÁGENES COMO ANTES (SIN INVENTOS) */
.img{
    width:100%;
    max-width:1000px;
    height:auto;  /* 🔥 CLAVE */
    display:block;
    margin:30px auto;
    border-radius:10px;
}

/* GRID ANTES / DESPUÉS */
.grid{
    display:grid;
    grid-template-columns:1fr 1.4fr;
    gap:20px;
}
@media(max-width:768px){
    .grid{grid-template-columns:1fr;}
}

/* BOTONES */
.btn{
    background:#E65C2E;
    color:#fff;
    padding:15px 25px;
    border:none;
    border-radius:8px;
    margin-top:15px;
    cursor:pointer;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
.modal-content{
    background:#fff;
    padding:20px;
    max-width:600px;
    width:90%;
    max-height:90%;
    overflow:auto;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="container">
<img src="logo.png" style="width:280px;">
</div>

<!-- HERO -->
<div class="container">
<img src="hero.jpg" class="img">

<h1>OPTIMIZA TU PLANTA DE CONFECCIÓN</h1>
<p style="color:#FFC107;font-weight:bold;">
Reduce costos, mejora tiempos y controla producción
</p>

<a href="https://wa.me/521XXXXXXXXXX" class="btn">
SOLICITA ASESORÍA
</a>
</div>

<!-- ANTES / DESPUÉS -->
<div class="container grid">
<img src="antes.jpg" class="img">
<img src="despues.jpg" class="img">
</div>

<!-- DIAGNÓSTICO -->
<div class="container">
<img src="asesoria.jpg" class="img">
<button class="btn" onclick="abrirModal('form')">
SOLICITAR ASESORÍA
</button>
</div>

<!-- CAPACITACIÓN -->
<div class="container">
<img src="capacitacion.jpg" class="img">
<button class="btn" onclick="abrirVideo('video1')">
MÁS INFORMACIÓN
</button>
</div>

<!-- TRAZO -->
<div class="container">
<img src="trazo.jpg" class="img">
<button class="btn" onclick="abrirVideo('video2')">
MÁS FUNCIONES
</button>
</div>

<!-- CERTIFICACIÓN -->
<div class="container">
<img src="certificacion.jpg" class="img">
<button class="btn" onclick="abrirModal('cert')">
OTRAS CERTIFICACIONES
</button>
</div>

<!-- PLOTER -->
<div class="container">
<img src="ploter.jpg" class="img">
<button class="btn" onclick="abrirVideo('video3')">
OTRAS VENTAJAS
</button>
</div>

<!-- CORTE -->
<div class="container">
<img src="corte.jpg" class="img">
<button class="btn" onclick="abrirVideo('video4')">
VER VIDEO
</button>
</div>

<!-- TEST -->
<div class="container">
<img src="test.jpg" class="img">
<button class="btn" onclick="abrirModal('test')">
RESPONDE EL TEST
</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content" id="contenido"></div>
</div>

<script>

function abrirModal(tipo){
let c = document.getElementById("contenido");

if(tipo=="cert"){
c.innerHTML = `
<h2>Certificaciones</h2>
<ul>
<li>Cortador</li>
<li>Trazador</li>
<li>Desarrollador de fichas técnicas</li>
</ul>`;
}

if(tipo=="form"){
c.innerHTML = `
<h2>Solicita Asesoría</h2>
<input placeholder="Nombre" style="width:100%;padding:10px;margin:10px 0;">
<input placeholder="Teléfono" style="width:100%;padding:10px;margin:10px 0;">
<button class="btn">Enviar</button>
`;
}

/* 🔥 TEST REAL FUNCIONAL */
if(tipo=="test"){
c.innerHTML = `
<h2>Diagnóstico rápido</h2>

<p>¿Usas patrones de cartón?</p>
<select id="q1"><option>SI</option><option>NO</option></select>

<p>¿Tienes control de consumo de tela?</p>
<select id="q2"><option>SI</option><option>NO</option></select>

<p>¿Tus tiempos de entrega son precisos?</p>
<select id="q3"><option>SI</option><option>NO</option></select>

<br><br>
<button class="btn" onclick="resultado()">Ver resultado</button>

<div id="resultado" style="margin-top:20px;font-weight:bold;"></div>
`;
}

document.getElementById("modal").style.display="flex";
}

function resultado(){
let score = 0;

if(document.getElementById("q1").value=="SI") score++;
if(document.getElementById("q2").value=="NO") score++;
if(document.getElementById("q3").value=="NO") score++;

let texto = "";

if(score>=2){
texto = "Tu planta necesita optimización. Te recomendamos asesoría.";
}else{
texto = "Vas bien, pero puedes mejorar tu productividad.";
}

document.getElementById("resultado").innerText = texto;
}

function abrirVideo(id){
document.getElementById("contenido").innerHTML =
`<iframe width="100%" height="400" src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>`;
document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick = function(){
this.style.display="none";
}

</script>

</body>
</html>
