<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIMÉX</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
}

/* ===== IMÁGENES CONTROLADAS ===== */
img {
    max-width: 100%;
    height: auto;
    display: block;
}

.section {
    padding: 40px 20px;
    text-align: center;
}

.section-img {
    width: 100%;
    max-width: 1100px;
    margin: auto;
    border-radius: 12px;
}

.hero-img {
    width: 100%;
    max-height: 600px;
    object-fit: cover;
}

/* ===== ANTES / DESPUÉS ===== */
.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 20px;
    align-items: center;
}

@media (max-width: 768px) {
    .grid-2 {
        grid-template-columns: 1fr;
    }
}

/* ===== BOTONES ===== */
.btn {
    background: #E65C2E;
    color: white;
    padding: 15px 25px;
    text-decoration: none;
    border-radius: 8px;
    display: inline-block;
    margin-top: 15px;
    cursor: pointer;
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:#fff;
    padding:20px;
    max-width:800px;
    width:90%;
}

/* ===== LOGO ARMADO ===== */
.logo-build img {
    position:absolute;
    opacity:0;
    animation: aparecer 1s forwards;
}

.logo-build img:nth-child(1){animation-delay:0.3s;}
.logo-build img:nth-child(2){animation-delay:0.6s;}
.logo-build img:nth-child(3){animation-delay:0.9s;}

@keyframes aparecer {
    to {opacity:1;}
}
</style>
</head>

<body>

<!-- LOGO ANIMADO -->
<div class="section logo-build" style="position:relative; height:200px;">
    <img src="logo1.png">
    <img src="logo2.png">
    <img src="logo3.png">
</div>

<!-- HERO -->
<div class="section">
    <img src="hero.jpg" class="hero-img">
    <h1>OPTIMIZA TU PLANTA DE CONFECCIÓN</h1>
    <p style="color:#FFC107; font-weight:bold;">
        Reduce costos, mejora tiempos, y controla producción
    </p>

    <a class="btn" href="https://wa.me/521XXXXXXXXXX">SOLICITA ASESORÍA</a>
</div>

<!-- ANTES / DESPUÉS -->
<div class="section grid-2">
    <img src="antes.jpg" class="section-img">
    <img src="despues.jpg" class="section-img">
</div>

<!-- DIAGNÓSTICO -->
<div class="section">
    <img src="asesoria.jpg" class="section-img">
    <button class="btn" onclick="abrirModal('formulario')">SOLICITAR ASESORÍA</button>
</div>

<!-- CAPACITACIÓN -->
<div class="section">
    <img src="capacitacion.jpg" class="section-img">
    <button class="btn" onclick="abrirVideo('video1')">MÁS INFORMACIÓN</button>
</div>

<!-- TRAZO -->
<div class="section">
    <img src="trazo.jpg" class="section-img">
    <button class="btn" onclick="abrirVideo('video2')">MÁS FUNCIONES</button>
</div>

<!-- CERTIFICACIÓN -->
<div class="section">
    <img src="certificacion.jpg" class="section-img">
    <button class="btn" onclick="abrirModal('certificaciones')">OTRAS CERTIFICACIONES</button>
</div>

<!-- PLOTER -->
<div class="section">
    <img src="ploter.jpg" class="section-img">
    <button class="btn" onclick="abrirVideo('video3')">OTRAS VENTAJAS</button>
</div>

<!-- CORTE -->
<div class="section">
    <img src="corte.jpg" class="section-img">
    <button class="btn" onclick="abrirVideo('video4')">VER VIDEO</button>
</div>

<!-- TEST -->
<div class="section">
    <img src="test.jpg" class="section-img">
    <button class="btn" onclick="abrirModal('test')">RESPONDE EL TEST</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
    <div class="modal-content" id="contenido"></div>
</div>

<script>
function abrirModal(tipo){
    let contenido = document.getElementById("contenido");

    if(tipo=="certificaciones"){
        contenido.innerHTML = `
        <h2>Certificaciones</h2>
        <ul>
        <li>Trazador</li>
        <li>Cortador</li>
        <li>Desarrollador de fichas técnicas</li>
        </ul>`;
    }

    if(tipo=="formulario"){
        contenido.innerHTML = `
        <h2>Formulario</h2>
        <input placeholder="Nombre"><br><br>
        <input placeholder="Email"><br><br>
        <button>Enviar</button>`;
    }

    if(tipo=="test"){
        contenido.innerHTML = `<h2>Cuestionario</h2><p>Aquí va tu test</p>`;
    }

    document.getElementById("modal").style.display="flex";
}

function abrirVideo(id){
    document.getElementById("contenido").innerHTML =
    `<iframe width="100%" height="400" src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>`;
    document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
