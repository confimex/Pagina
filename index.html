<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIMEX</title>

<style>
body{margin:0;font-family:Arial;background:#fff;}
section{padding:60px 20px;text-align:center;}
h1,h2{margin:10px 0;}
.btn{
background:#E65C2E;
color:#fff;
padding:15px 30px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
display:inline-block;
text-decoration:none;
}

/* HERO */
.hero{
background:#0F2C3F;
color:white;
}

/* IMÁGENES */
.img-full{width:100%;max-width:1000px;margin:auto;display:block;border-radius:10px;}

/* GRID */
.grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.card{max-width:500px;flex:1}

/* MODAL VIDEO */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.modal iframe{width:90%;height:60%;}
.close{position:absolute;top:20px;right:20px;color:white;font-size:30px;cursor:pointer;}

/* LOGO ANIMADO */
.logo-build img{
width:80px;
opacity:0;
transform:translateY(20px);
animation:appear 1s forwards;
}
.logo-build img:nth-child(2){animation-delay:0.3s;}
.logo-build img:nth-child(3){animation-delay:0.6s;}

@keyframes appear{
to{opacity:1;transform:translateY(0);}
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
    <div class="logo-build">
        <img src="logo1.png">
        <img src="logo2.png">
        <img src="logo3.png">
    </div>

    <h1>OPTIMIZA TU PLANTA DE CONFECCIÓN</h1>
    <p style="color:yellow;font-size:1.2rem;">
        Reduce costos, mejora tiempos y controla producción
    </p>

    <a class="btn" href="https://wa.me/521XXXXXXXXXX" target="_blank">
        SOLICITA ASESORÍA
    </a>
</section>

<!-- TRANSFORMACIÓN -->
<section>
    <h2>TRANSFORMACIÓN REAL</h2>
    <div class="grid">
        <div class="card">
            <img src="antes.jpg" class="img-full">
            <p>ANTES</p>
        </div>
        <div class="card">
            <img src="despues.jpg" class="img-full" style="transform:scale(1.1);">
            <p>DESPUÉS</p>
        </div>
    </div>
</section>

<!-- DIAGNÓSTICO -->
<section>
    <img src="diagnostico.jpg" class="img-full">
    <br><br>
    <button class="btn" onclick="mostrarForm()">SOLICITAR ASESORÍA</button>
</section>

<!-- FORM -->
<section id="formulario" style="display:none;">
<h2>Diagnóstico</h2>
<form action="mailto:tuemail@gmail.com" method="post" enctype="text/plain">
<input placeholder="Empresa" required><br><br>
<input placeholder="Ciudad"><br><br>
<input placeholder="Nombre"><br><br>
<input placeholder="Correo"><br><br>
<input placeholder="Teléfono"><br><br>
<button class="btn">Enviar</button>
</form>
</section>

<!-- CAPACITACIÓN -->
<section>
    <img src="capacitacion.jpg" class="img-full">
    <br><br>
    <button class="btn" onclick="video('https://www.youtube.com/embed/VIDEO1')">
        MÁS INFORMACIÓN
    </button>
</section>

<!-- TRAZO -->
<section>
    <img src="trazo.jpg" class="img-full">
    <br><br>
    <button class="btn" onclick="video('https://www.youtube.com/embed/VIDEO2')">
        MÁS FUNCIONES
    </button>
</section>

<!-- CERTIFICACIÓN -->
<section>
    <img src="certificacion.jpg" class="img-full">
    <br><br>
    <button class="btn" onclick="mostrarLista()">
        OTRAS CERTIFICACIONES
    </button>

    <div id="lista" style="display:none;margin-top:20px;">
        <p>Trazador</p>
        <p>Cortador</p>
        <p>Desarrollador de fichas técnicas</p>
    </div>
</section>

<!-- PLOTER -->
<section>
    <img src="ploter.jpg" class="img-full">
    <br><br>
    <button class="btn" onclick="video('https://www.youtube.com/embed/VIDEO3')">
        OTRAS VENTAJAS
    </button>
</section>

<!-- CORTE -->
<section>
    <img src="corte.jpg" class="img-full">
    <br><br>
    <button class="btn" onclick="video('https://www.youtube.com/embed/VIDEO4')">
        VER VIDEO
    </button>
</section>

<!-- TEST -->
<section>
    <img src="test.jpg" class="img-full">
    <br><br>
    <button class="btn" onclick="mostrarTest()">
        RESPONDE EL TEST
    </button>
</section>

<!-- TEST SIMPLE -->
<section id="test" style="display:none;">
<h2>Test rápido</h2>

<p>¿Tu planta está desorganizada?</p>
<button onclick="resultado(true)">Sí</button>
<button onclick="resultado(false)">No</button>

<p id="resultado"></p>
</section>

<!-- MODAL VIDEO -->
<div class="modal" id="modal">
<span class="close" onclick="cerrar()">X</span>
<iframe id="frame" src=""></iframe>
</div>

<script>
function video(link){
document.getElementById("modal").style.display="flex";
document.getElementById("frame").src=link;
}

function cerrar(){
document.getElementById("modal").style.display="none";
document.getElementById("frame").src="";
}

function mostrarForm(){
document.getElementById("formulario").style.display="block";
}

function mostrarLista(){
document.getElementById("lista").style.display="block";
}

function mostrarTest(){
document.getElementById("test").style.display="block";
}

function resultado(r){
document.getElementById("resultado").innerText =
r ? "Necesitas asesoría urgente" : "Vas bien pero puedes mejorar";
}
</script>

</body>
</html>
