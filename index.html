<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIMEX</title>

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial, sans-serif;background:#fff;color:#222;}

/* ===== CONTENEDOR GLOBAL (CLAVE) ===== */
.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

/* ===== IMÁGENES CONTROLADAS ===== */
.img-box{
    width:100%;
    max-width:1000px;
    margin:30px auto;
}

.img-box img{
    width:100%;
    height:auto;
    display:block;
    border-radius:10px;
}

/* ===== HERO ===== */
.hero{
    text-align:center;
}

.hero img{
    max-width:900px;
    margin:auto;
}

.hero h1{
    font-size:2.5rem;
    margin-top:20px;
}

.hero p{
    color:#FFC107;
    font-weight:bold;
    margin:10px 0 20px;
}

/* ===== BOTONES ===== */
.btn{
    display:inline-block;
    background:#E65C2E;
    color:#fff;
    padding:15px 25px;
    border-radius:8px;
    text-decoration:none;
    cursor:pointer;
    border:none;
}

.btn:hover{
    background:#c94a1f;
}

/* ===== GRID ANTES / DESPUÉS ===== */
.grid{
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:20px;
}

@media(max-width:768px){
    .grid{grid-template-columns:1fr;}
}

/* ===== MODAL ===== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#fff;
    padding:20px;
    max-width:800px;
    width:90%;
}

/* ===== LOGO ANIMADO ===== */
.logo{
    text-align:center;
    padding:40px 0;
}

.logo img{
    width:300px;
    animation:fade 1s ease-in-out;
}

@keyframes fade{
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
    <img src="logo.png">
</div>

<!-- HERO -->
<div class="container hero">
    <img src="hero.jpg">

    <h1>OPTIMIZA TU PLANTA DE CONFECCIÓN</h1>

    <p>Reduce costos, mejora tiempos y controla producción</p>

    <a href="https://wa.me/521XXXXXXXXXX" class="btn">
        SOLICITA ASESORÍA
    </a>
</div>

<!-- TRANSFORMACIÓN -->
<div class="container grid">
    <div class="img-box">
        <img src="antes.jpg">
    </div>
    <div class="img-box">
        <img src="despues.jpg">
    </div>
</div>

<!-- DIAGNÓSTICO -->
<div class="container">
    <div class="img-box">
        <img src="asesoria.jpg">
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="abrirModal('form')">
            SOLICITAR ASESORÍA
        </button>
    </div>
</div>

<!-- CAPACITACIÓN -->
<div class="container">
    <div class="img-box">
        <img src="capacitacion.jpg">
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="abrirVideo('video1')">
            MÁS INFORMACIÓN
        </button>
    </div>
</div>

<!-- TRAZO -->
<div class="container">
    <div class="img-box">
        <img src="trazo.jpg">
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="abrirVideo('video2')">
            MÁS FUNCIONES
        </button>
    </div>
</div>

<!-- CERTIFICACIÓN -->
<div class="container">
    <div class="img-box">
        <img src="certificacion.jpg">
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="abrirModal('cert')">
            OTRAS CERTIFICACIONES
        </button>
    </div>
</div>

<!-- PLOTER -->
<div class="container">
    <div class="img-box">
        <img src="ploter.jpg">
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="abrirVideo('video3')">
            OTRAS VENTAJAS
        </button>
    </div>
</div>

<!-- CORTE -->
<div class="container">
    <div class="img-box">
        <img src="corte.jpg">
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="abrirVideo('video4')">
            VER VIDEO
        </button>
    </div>
</div>

<!-- TEST -->
<div class="container">
    <div class="img-box">
        <img src="test.jpg">
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="abrirModal('test')">
            RESPONDE EL TEST
        </button>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
    <div class="modal-content" id="contenido"></div>
</div>

<script>

function abrirModal(tipo){
    let c = document.getElementById("contenido");

    if(tipo=="cert"){
        c.innerHTML = `
        <h2>Certificaciones</h2>
        <ul>
        <li>Cortador</li>
        <li>Trazador</li>
        <li>Desarrollador de fichas técnicas</li>
        </ul>`;
    }

    if(tipo=="form"){
        c.innerHTML = `
        <h2>Formulario</h2>
        <input placeholder="Nombre"><br><br>
        <input placeholder="Teléfono"><br><br>
        <button class="btn">Enviar</button>`;
    }

    if(tipo=="test"){
        c.innerHTML = `<h2>Cuestionario</h2><p>Aquí va tu test</p>`;
    }

    document.getElementById("modal").style.display="flex";
}

function abrirVideo(id){
    document.getElementById("contenido").innerHTML =
    `<iframe width="100%" height="400" src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>`;
    document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
